services:
  shelkit:
    build: .
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - SHELBY_API_KEY=${SHELBY_API_KEY:-}
      - SHELBY_PRIVATE_KEY=${SHELBY_PRIVATE_KEY:-}
      - SHELBY_NETWORK=${SHELBY_NETWORK:-shelbynet}
      - BLOB_EXPIRY_DAYS=${BLOB_EXPIRY_DAYS:-365}
      - BASE_DOMAIN=shelkit.forestinfra.com
      - DB_PATH=/app/data/shelkit.db
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      # nginx-proxy picks these up automatically for routing + SSL
      - VIRTUAL_HOST=shelkit.forestinfra.com,*.shelkit.forestinfra.com
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=shelkit.forestinfra.com,*.shelkit.forestinfra.com
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-christopher.dowle@forestinfra.com}
      - ACME_CHALLENGE=dns-01
    volumes:
      - shelkit-data:/app/data
      - shelkit-uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - proxy

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "com.github.nginx-proxy.nginx"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - ./nginx/custom.conf:/etc/nginx/conf.d/custom.conf:ro
    restart: unless-stopped
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - acme-state:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-christopher.dowle@forestinfra.com}
      # Cloudflare DNS challenge for wildcard certs
      - CF_Key=${CF_KEY}
      - CF_Email=${CF_EMAIL}
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy

volumes:
  shelkit-data:
  shelkit-uploads:
  nginx-certs:
  nginx-vhost:
  nginx-html:
  acme-state:

networks:
  proxy:
    driver: bridge
