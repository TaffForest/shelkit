# Custom nginx settings applied on top of nginx-proxy defaults

# Increase upload size for ZIP deploys (50MB)
client_max_body_size 50M;

# Increase timeouts for large builds (5 minutes)
proxy_read_timeout 300s;
proxy_send_timeout 300s;
proxy_connect_timeout 60s;

# Disable buffering for SSE (build log streaming)
proxy_buffering off;
