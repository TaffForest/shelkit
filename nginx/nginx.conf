server {
    listen 80;
    server_name shelkit.forestinfra.com *.shelkit.forestinfra.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shelkit.forestinfra.com *.shelkit.forestinfra.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/shelkit.forestinfra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shelkit.forestinfra.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Upload size (match server's 50MB limit)
    client_max_body_size 55M;

    # Proxy to Node app
    location / {
        proxy_pass http://shelkit:3000;
        proxy_http_version 1.1;

        # Preserve host for subdomain routing
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # SSE support (build logs)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Timeouts for large builds
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
